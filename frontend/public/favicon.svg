<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="500" height="500" rx="112" fill="url(#bg)"/>
  <rect width="500" height="500" rx="112" fill="url(#shine)"/>

  <!-- Top shimmer line -->
  <rect x="70" y="28" width="360" height="5" rx="2.5" fill="#ffffff" opacity="0.35"/>

  <!-- Letter A — geometric white -->
  <polygon
    points="110,430 190,110 250,110 310,110 390,430 318,430 288,335 212,335 182,430"
    fill="#ffffff" opacity="0.97"
  />

  <!-- Crossbar cutout -->
  <polygon points="225,300 250,195 275,300" fill="url(#bg)"/>
</svg>
